<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Agent Testing Framework Dashboard</title>
    <style>
        :root {
            --bg-color: #121212;
            --surface-color: #1e1e1e;
            --text-color: #e0e0e0;
            --text-muted: #a0a0a0;
            --primary-color: #bb86fc;
            --success-color: #03dac6;
            --error-color: #cf6679;
            --warning-color: #ffb74d;
            --border-color: #333333;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 2rem;
            line-height: 1.6;
        }

        header {
            text-align: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border-color);
        }

        h1 { font-weight: 300; margin-bottom: 0.5rem; }
        .meta-info { color: var(--text-muted); font-size: 0.9rem; }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .card {
            background-color: var(--surface-color);
            border-radius: 8px;
            padding: 1.5rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            text-align: center;
        }

        .card h3 {
            font-size: 1rem;
            color: var(--text-muted);
            margin-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Simple circular gauge simulation */
        .gauge-container {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 0 auto;
            border-radius: 50%;
            background: conic-gradient(var(--primary-color) var(--val), var(--bg-color) 0);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .gauge-container::before {
            content: "";
            position: absolute;
            width: 100px;
            height: 100px;
            background-color: var(--surface-color);
            border-radius: 50%;
        }

        .gauge-value {
            position: relative;
            font-size: 1.5rem;
            font-weight: bold;
        }
        
        .cost-card {
            text-align: left;
        }
        .cost-card .stat {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--primary-color);
            margin-bottom: 0.5rem;
        }

        .filters {
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        button {
            background-color: var(--surface-color);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 0.5rem 1rem;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        button:hover, button.active {
            background-color: var(--primary-color);
            color: #000;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background-color: var(--surface-color);
            border-radius: 8px;
            overflow: hidden;
        }

        th, td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
            vertical-align: top;
        }

        th { background-color: rgba(255,255,255,0.05); font-weight: 500; }
        
        tr.pass td:first-child { border-left: 4px solid var(--success-color); }
        tr.fail td:first-child { border-left: 4px solid var(--error-color); }

        .tag {
            display: inline-block;
            padding: 0.2rem 0.5rem;
            border-radius: 12px;
            font-size: 0.8rem;
            background-color: rgba(255,255,255,0.1);
            margin-right: 0.5rem;
        }

        .badge-pass { color: var(--success-color); font-weight: bold; }
        .badge-fail { color: var(--error-color); font-weight: bold; }

        .output-box {
            margin-top: 0.5rem;
            padding: 0.75rem;
            border-radius: 4px;
            background-color: rgba(0,0,0,0.2);
            font-size: 0.9rem;
            border-left: 3px solid var(--border-color);
        }
        .output-box.expected {
            border-left-color: var(--warning-color);
        }
        .output-box.actual {
            border-left-color: var(--primary-color);
        }
        .output-label {
            font-weight: bold;
            font-size: 0.75rem;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 0.25rem;
            display: block;
        }

    </style>
</head>

        </div>
        <div class="card">

        <div class="card cost-card">

    <div class="filters" id="filters">

        <button data-filter="normal">Normal</button>

                tr.className = res.passed ? 'pass' : 'fail';
                
                // Escape HTML utility
                const escapeHtml = (unsafe) => {
                    if (!unsafe) return "";
                    return unsafe
                        .toString()
                        .replace(/&/g, "&amp;")
                        .replace(/</g, "&lt;")
                        .replace(/>/g, "&gt;")
                        .replace(/"/g, "&quot;")
                        .replace(/'/g, "&#039;");
                };

                const expectedText = escapeHtml(res.expected_behavior || 'Not specified');
                const actualText = escapeHtml(res.response || '');
                const inputText = escapeHtml(res.input || '');

                tr.innerHTML = `
                    <td>
                        <strong>${res.id}</strong><br><br>
                        <span class="tag">${res.category}</span>
                    </td>
                    <td>
                        <div style="margin-bottom: 0.5rem; font-weight: 500;">${inputText}</div>
                        <div class="output-box expected">
                            <span class="output-label">Expected Behavior</span>
                            ${expectedText}
                        </div>
                        <div class="output-box actual">
                            <span class="output-label">Actual Output</span>
                            ${actualText}
                        </div>
                    </td>
                    <td><span class="${res.passed ? 'badge-pass' : 'badge-fail'}">${res.passed ? 'PASS' : 'FAIL'}</span></td>
                    <td class="meta-info">$${res.cost.toFixed(6)}<br>${res.duration.toFixed(2)}s</td>
                `;
                tbody.appendChild(tr);
            });
        }

        // Setup Filters
        document.getElementById('filters').addEventListener('click', (e) => {
            if (e.target.tagName === 'BUTTON') {
                document.querySelectorAll('#filters button').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                renderTable(e.target.dataset.filter);
            }
        });

        init();
    </script>
</body>
</html>
